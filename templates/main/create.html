{% extends "main/base.html" %}
{% block title %} Create New Location {% endblock %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5>Create New Location</h5>
        </div>
        <div class="card-body">
            <form method="post" action="/create/" class="form-group">
                {% csrf_token %}
                {{form|crispy}}
                <button type="submit" name="save" class="btn btn-sm btn-secondary active">Create New Location</button>
            </form>
        </div>
    </div>
{% endblock %}
