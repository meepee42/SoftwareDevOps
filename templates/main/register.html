{% extends "main/base.html" %}
{% block title %}Register User{% endblock %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5>Register User</h5>
        </div>
        <div class="card-body">
            <form method="POST" class="form-group">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" name="save" class="btn btn-sm btn-secondary active">Register User</button>
            </form>
        </div>
    </div>

{% endblock %}
