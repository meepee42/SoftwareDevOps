{% extends "main/base.html" %}
{% block title %} Modify Charger {% endblock %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5>Modify Charger</h5>
            <a href="/location/{{ location_id }}" type="button" class="btn btn-sm btn-secondary active">Return to location</a>
        </div>
        <div class="card-body">
            <form method="post" action="/location/charger/{{ charger_id }}" class="form-group">
                {% csrf_token %}
                {{form|crispy}}
                <button type="submit" name="save" class="btn btn-sm btn-secondary active">Update Charger Information</button>
            </form>
        </div>
    </div>
{% endblock %}
