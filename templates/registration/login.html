{% extends "main/base.html" %}

{% block title %} Log In {% endblock %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5>Log In</h5>
        </div>
        <div class="card-body">
            <form method="post" class="form-group">
                {% csrf_token %}
                {{form|crispy}}
                {% if not user.is_authenticated and not user.admin %}
                    <p>Dont have an account? <a class="active" href="/register/">Register here</a></p>
                {% endif %}
                <button type="submit" name="save" class="btn btn-sm btn-secondary active">Log In</button>
            </form>
        </div>
    </div>
{% endblock %}
